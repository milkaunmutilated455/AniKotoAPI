<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found | AniKatoAPI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-size: 8rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #e94560, #0f3460);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #a0a0a0;
        }
        p {
            color: #a0a0a0;
            margin-bottom: 30px;
        }
        a {
            display: inline-block;
            background: #e94560;
            color: #fff;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 25px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        a:hover {
            transform: translateY(-3px);
            box-shadow 0 10px 20px rgba(233, 69, 96, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Endpoint Not Found</h2>
        <p>The API endpoint you're looking for doesn't exist.</p>
        <a href="/">Go to API Documentation</a>
    </div>
</body>
</html>
